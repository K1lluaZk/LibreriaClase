<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h4 mb-0">Libros</h1>
  <a routerLink="/libros/nuevo" class="btn btn-primary btn-sm">+ Nuevo libro</a>
</div>

<div class="mb-3">
  <input
    type="text"
    class="form-control"
    placeholder="Buscar por título, autor o ISBN..."
    [formControl]="buscarControl"
  />
</div>

<div class="alert alert-danger py-2" *ngIf="errorMensaje()">{{ errorMensaje() }}</div>

<div class="text-center text-muted py-4" *ngIf="cargando()">Cargando...</div>

<div class="table-responsive" *ngIf="!cargando()">
  <table class="table table-hover align-middle">
    <thead>
      <tr>
        <th>Título</th>
        <th>Autor</th>
        <th>Categoría</th>
        <th>ISBN</th>
        <th>Año</th>
        <th class="text-center">Disponibles</th>
        <th class="text-end">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let libro of libros()">
        <td>{{ libro.titulo }}</td>
        <td>{{ libro.autor }}</td>
        <td><span class="badge bg-light text-dark">{{ libro.categoria }}</span></td>
        <td>{{ libro.isbn || '—' }}</td>
        <td>{{ libro.anio || '—' }}</td>
        <td class="text-center">
          <span class="badge" [class.bg-success]="libro.cantidadDisponible > 0" [class.bg-danger]="libro.cantidadDisponible === 0">
            {{ libro.cantidadDisponible }}
          </span>
        </td>
        <td class="text-end">
          <a [routerLink]="['/libros', libro.id, 'editar']" class="btn btn-outline-secondary btn-sm">Editar</a>
          <button
            *ngIf="puedeEliminar()"
            class="btn btn-outline-danger btn-sm ms-1"
            (click)="eliminar(libro)"
          >
            Eliminar
          </button>
        </td>
      </tr>
      <tr *ngIf="libros().length === 0">
        <td colspan="7" class="text-center text-muted py-4">No se encontraron libros</td>
      </tr>
    </tbody>
  </table>
</div>
