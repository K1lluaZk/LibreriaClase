<div class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-sm" style="width: 100%; max-width: 380px;">
    <div class="card-body p-4">
      <h1 class="h4 mb-1 text-center">Sistema de Biblioteca</h1>
      <p class="text-muted text-center mb-4">Iniciá sesión para continuar</p>

      <form [formGroup]="formulario" (ngSubmit)="onSubmit()" novalidate>
        <div class="mb-3">
          <label for="correo" class="form-label">Correo</label>
          <input
            id="correo"
            type="email"
            class="form-control"
            formControlName="correo"
            [class.is-invalid]="f['correo'].invalid && f['correo'].touched"
          />
          <div class="invalid-feedback" *ngIf="f['correo'].touched && f['correo'].errors?.['required']">
            El correo es obligatorio
          </div>
          <div class="invalid-feedback" *ngIf="f['correo'].touched && f['correo'].errors?.['email']">
            El correo no tiene un formato válido
          </div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input
            id="password"
            type="password"
            class="form-control"
            formControlName="password"
            [class.is-invalid]="f['password'].invalid && f['password'].touched"
          />
          <div class="invalid-feedback" *ngIf="f['password'].touched && f['password'].errors?.['required']">
            La contraseña es obligatoria
          </div>
        </div>

        <div class="alert alert-danger py-2" *ngIf="errorMensaje()">
          {{ errorMensaje() }}
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="cargando()">
          <span *ngIf="cargando()" class="spinner-border spinner-border-sm me-2"></span>
          Ingresar
        </button>
      </form>
    </div>
  </div>
</div>
