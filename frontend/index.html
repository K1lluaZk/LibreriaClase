<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Sistema de Librería</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>📚 Sistema de Librería</h1>
    <p>Gestión de libros (CRUD)</p>
  </header>

  <main>
    <section class="formulario">
      <h2 id="form-titulo">Agregar nuevo libro</h2>
      <form id="libro-form">
        <input type="hidden" id="libro-id" />

        <label>Título *</label>
        <input type="text" id="titulo" required />

        <label>Autor *</label>
        <input type="text" id="autor" required />

        <label>ISBN</label>
        <input type="text" id="isbn" />

        <label>Año</label>
        <input type="number" id="anio" />

        <label class="checkbox-label">
          <input type="checkbox" id="disponible" checked />
          Disponible
        </label>

        <div class="botones">
          <button type="submit" id="btn-guardar">Guardar</button>
          <button type="button" id="btn-cancelar" style="display:none;">Cancelar edición</button>
        </div>
      </form>
    </section>

    <section class="lista">
      <h2>Libros registrados</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Autor</th>
            <th>ISBN</th>
            <th>Año</th>
            <th>Disponible</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-libros">
        </tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
